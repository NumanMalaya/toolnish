<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolNish - Professional Online Tools</title>

<!-- Header/Footer CSS -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- Tool-specific CSS inside <style> -->
<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#222;
  --primary:#4e73df;
  --accent:#1cc88a;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
  --primary:#6c8cff;
  --accent:#20c997;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  width:100%;
  max-width:1200px;
  margin:auto;
}
.hero{text-align:center;margin-bottom:30px;}
.search-bar{text-align:center;margin-bottom:30px;}
.search-bar input{
  width:100%;
  max-width:400px;
  padding:12px;
  border-radius:25px;
  border:1px solid #ddd;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  transition:.3s;
  text-align:center;
  font-weight:500;
}
.tools-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  width:100%;
}
.tool-card{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.3s;
  text-align:center;
  font-weight:500;
  text-decoration:none;
  color:var(--text);
}
.tool-card:hover{
  transform:translateY(-5px);
  background:var(--primary);
  color:white;
}
</style>
</head>
<body>

<div class="main-content">
  <div class="hero">
    <h2>Professional Online Tools</h2>
    <p>Fast • Secure • Easy to Use</p>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="Search tools..." onkeyup="searchTools(this.value)">
  </div>

  <div class="tools-grid">
    <!-- Normal links to open in same tab -->
    <a class="tool-card" href="bmiCalculator.html">BMI Calculator</a>
    <a class="tool-card" href="cgpaCalculator.html">CGPA Calculator</a>
    <a class="tool-card" href="unitConverter.html">Unit Converter</a>
    <a class="tool-card" href="loanCalculator.html">Loan / EMI Calculator</a>
    <a class="tool-card" href="qrGenerator.html">QR Code Generator</a>
    <a class="tool-card" href="qrScanner.html">QR Code Scanner</a>
    <a class="tool-card" href="gpsStamp.html">GPS Stamp</a>  
    <a class="tool-card" href="bdaPdf.html">BDA PDF</a>  
    <a class="tool-card" href="slwmcPdf.html">SLWMC PDF</a>  
    <a class="tool-card" href="a.html">Yomo</a>  
  </div>
</div>

<script>
// Search tools dynamically
function searchTools(q) {
    document.querySelectorAll(".tool-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(q.toLowerCase()) ? "block" : "none";
    });
}
</script>

</body>
</html>
