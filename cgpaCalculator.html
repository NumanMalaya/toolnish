<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator - PakTools</title>

<!-- Header/Footer -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- Tool-specific CSS -->
<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --text:#222;
  --primary:#4e73df;
  --accent:#1cc88a;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
  --primary:#6c8cff;
  --accent:#20c997;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  width:100%;
  max-width:600px;
  margin:auto;
  /* no background, no shadow */
  text-align:center;
}
.main-content input, .main-content button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
button{
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  transition:.3s;
}
button:hover{opacity:.9;}
.result{
  margin-top:15px;
  font-weight:600;
  color:var(--accent);
}
.semester{display:flex;gap:10px;margin-top:5px;}
.semester input{flex:1;}
@media(max-width:500px){
  .semester{flex-direction:column;}
}
</style>
</head>
<body>

<div class="main-content">
  <h2>University CGPA Calculator</h2>
  <p>Enter your semester GPAs and credits:</p>
  <div id="semesters">
    <div class="semester">
      <input type="number" class="gpa" placeholder="Semester GPA">
      <input type="number" class="credit" placeholder="Semester Credits">
    </div>
  </div>
  <button onclick="addSemester()">+ Add Semester</button>
  <button onclick="calculateCGPA()">Calculate CGPA</button>
  <div class="result" id="cgpaResult"></div>
</div>

<script>
function addSemester() {
    let div = document.createElement("div");
    div.className = "semester";
    div.innerHTML = `<input type="number" class="gpa" placeholder="Semester GPA">
<input type="number" class="credit" placeholder="Semester Credits">`;
    document.getElementById("semesters").appendChild(div);
}

function calculateCGPA() {
    let gpas = document.querySelectorAll(".gpa");
    let credits = document.querySelectorAll(".credit");
    let totalPoints = 0, totalCredits = 0;
    for (let i = 0; i < gpas.length; i++) {
        let g = parseFloat(gpas[i].value);
        let c = parseFloat(credits[i].value);
        if (isNaN(g) || isNaN(c) || g < 0 || c <= 0) { 
            document.getElementById("cgpaResult").innerText = "Enter valid GPA and credits for all semesters"; 
            return; 
        }
        totalPoints += g * c;
        totalCredits += c;
    }
    let cgpa = (totalPoints / totalCredits).toFixed(2);
    document.getElementById("cgpaResult").innerText = "Your CGPA is: " + cgpa;
}
</script>

</body>
</html>
