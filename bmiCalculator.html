<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator - PakTools</title>

<!-- Header/Footer -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- Tool-specific CSS -->
<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --text:#222;
  --primary:#4e73df;
  --accent:#1cc88a;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
  --primary:#6c8cff;
  --accent:#20c997;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.main-content{
  flex:1; /* fills remaining space to push footer down */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  width:100%;
  max-width:600px;
  margin:auto;
}
.main-content input, .main-content button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
button{
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  transition:.3s;
}
button:hover{opacity:.9;}
.result{margin-top:15px;font-weight:600;}
canvas{margin-top:20px;}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main-content">
  <h2>BMI Calculator</h2>
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="height" placeholder="Height (cm)">
  <button onclick="calculateBMI()">Calculate</button>
  <div class="result" id="bmiResult"></div>
  <canvas id="bmiChart"></canvas>
</div>

<script>
let bmiChart;
function calculateBMI() {
    let w = document.getElementById("weight").value;
    let h = document.getElementById("height").value / 100;
    if(!w || !h){document.getElementById("bmiResult").innerText="Enter valid numbers";return;}
    let bmi = (w/(h*h)).toFixed(1);
    let category="", color="";
    if(bmi<18.5){category="Underweight"; color="blue";}
    else if(bmi<25){category="Normal"; color="green";}
    else if(bmi<30){category="Overweight"; color="orange";}
    else{category="Obese"; color="red";}
    document.getElementById("bmiResult").innerHTML=`BMI: ${bmi} (<span style="color:${color}">${category}</span>)`;

    if(bmiChart) bmiChart.destroy();
    bmiChart = new Chart(document.getElementById("bmiChart"), {
        type:"bar",
        data:{labels:["Underweight","Normal","Overweight","Obese"],datasets:[{data:[18.5,25,30,40],backgroundColor:["blue","green","orange","red"]}]},
        options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
    });
}
</script>

</body>
</html>
