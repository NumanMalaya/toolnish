<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Scanner - PakTools</title>

<!-- Header/Footer -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- QR Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Tool-specific CSS -->
<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --text:#222;
  --primary:#4e73df;
  --accent:#1cc88a;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
  --primary:#6c8cff;
  --accent:#20c997;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px;
  width:100%;
  max-width:600px;
  margin:auto;
  gap:10px;
  text-align:center;
}
#qr-reader{
  width:100%;
  max-width:300px;
}
.main-content input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-top:10px;
  font-size:14px;
}
.main-content button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:.3s;
  font-size:14px;
}
.main-content button:hover{opacity:.9;}
.result{
  margin-top:15px;
  font-weight:600;
  color:var(--accent);
}
button + button{margin-left:5px;}
@media(max-width:500px){
  .main-content button{width:100%;}
}
</style>
</head>
<body>

<div class="main-content">
  <h2>QR Code Scanner</h2>
  <div id="qr-reader"></div>
  <input type="text" id="qrResult" placeholder="Scanned result will appear here..." readonly>
  <div style="display:flex; gap:5px; margin-top:5px;">
    <button onclick="copyQR()">Copy</button>
    <button onclick="openQR()">Open Link</button>
    <button onclick="searchQR()">Web Search</button>
  </div>
</div>

<script>
let html5QrCode;

function startQRScanner() {
    const qrResult = document.getElementById("qrResult");
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => { qrResult.value = decodedText; html5QrCode.stop(); },
        (errorMessage) => { }
    ).catch(err => console.error("QR Scanner error:", err));
}

function copyQR() {
    const text = document.getElementById("qrResult").value;
    if(!text) return alert("No QR result!");
    navigator.clipboard.writeText(text);
    alert("Copied to clipboard!");
}
function openQR() {
    const text = document.getElementById("qrResult").value;
    if(!text) return alert("No QR result!");
    window.open(text,"_blank");
}
function searchQR() {
    const text = document.getElementById("qrResult").value;
    if(!text) return alert("No QR result!");
    window.open("https://www.google.com/search?q="+encodeURIComponent(text), "_blank");
}

// Auto-start
startQRScanner();
</script>

</body>
</html>
