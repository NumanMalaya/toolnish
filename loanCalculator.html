<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan / EMI Calculator - PakTools</title>

<!-- Header/Footer -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- Tool-specific CSS -->
<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --text:#222;
  --primary:#4e73df;
  --accent:#1cc88a;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
  --primary:#6c8cff;
  --accent:#20c997;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  width:100%;
  max-width:600px;
  margin:auto;
  text-align:center;
}
.main-content input, .main-content button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}
button{
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  transition:.3s;
}
button:hover{opacity:.9;}
.result{
  margin-top:15px;
  font-weight:600;
  color:var(--accent);
}
</style>
</head>
<body>

<div class="main-content">
  <h2>Loan / EMI Calculator</h2>
  <input type="number" id="loanAmount" placeholder="Loan Amount">
  <input type="number" id="interestRate" placeholder="Annual Interest %">
  <input type="number" id="loanMonths" placeholder="Tenure (Months)">
  <button onclick="calculateEMI()">Calculate EMI</button>
  <div class="result" id="loanResult"></div>
</div>

<script>
function calculateEMI() {
    let P = parseFloat(document.getElementById("loanAmount").value);
    let r = parseFloat(document.getElementById("interestRate").value)/100/12;
    let n = parseInt(document.getElementById("loanMonths").value);
    if(isNaN(P)||isNaN(r)||isNaN(n)) { 
        document.getElementById("loanResult").innerText="Enter valid numbers"; 
        return; 
    }
    let emi = P*r*(Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
    document.getElementById("loanResult").innerText = "Monthly EMI: " + emi.toFixed(2);
}
</script>

</body>
</html>
